<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador STRM - Emby</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #1e1e2e; color: #cdd6f4; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: #313244; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h1, h2 { color: #89b4fa; text-align: center; }
        h2 { font-size: 1.5em; margin-top: 30px; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        select, input, button { width: 100%; padding: 10px; margin-top: 5px; border-radius: 5px; border: 1px solid #45475a; background: #181825; color: #cdd6f4; box-sizing: border-box; }
        button { background-color: #a6e3a1; color: #11111b; font-weight: bold; cursor: pointer; border: none; margin-top: 20px; transition: background-color 0.2s; }
        button:hover { background-color: #94e2d5; }
        
        .btn-blue { background-color: #89b4fa; }
        .btn-blue:hover { background-color: #74c7ec; }
        .btn-purple { background-color: #cba6f7; }
        .btn-purple:hover { background-color: #b4befe; }
        
        #message { margin-top: 15px; text-align: center; font-weight: bold; color: #a6e3a1; }
        .current-path { background: #11111b; padding: 10px; border-radius: 5px; margin-top: 20px; font-family: monospace; }
        #new_subfolder_div { display: none; margin-top: 10px; padding: 10px; border-left: 3px solid #89b4fa; background: #1e1e2e;}
        
        /* Estilos para a lista de arquivos */
        .file-list { list-style: none; padding: 0; margin-top: 15px; }
        .file-item { background: #181825; padding: 10px; margin-bottom: 8px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; word-break: break-all; }
        .file-item-col { flex-direction: column; align-items: flex-start; }
        .file-item-header { width: 100%; display: flex; justify-content: space-between; align-items: center; }
        .file-info { flex: 1; padding-right: 10px; }
        .file-actions { display: flex; gap: 5px; margin-left: 10px; flex-shrink: 0; }
        
        .btn-rename { background-color: #f9e2af; margin-top: 0; width: auto; padding: 5px 10px; font-size: 0.9em; }
        .btn-rename:hover { background-color: #f2cd32; }
        .btn-delete { background-color: #f38ba8; margin-top: 0; width: auto; padding: 5px 10px; font-size: 0.9em; }
        .btn-delete:hover { background-color: #eba0ac; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gerenciador de Mídia Emby</h1>
        <p style="text-align: center;">Defina onde os novos arquivos `.strm` recebidos pelo Webhook serão salvos.</p>
        
        <form id="configForm">
            <label for="category">Categoria (Pasta Principal):</label>
            <select id="category" name="category">
                {% for cat in categories %}
                    <option value="{{ cat }}" {% if cat == current_config.category %}selected{% endif %}>{{ cat|title }}</option>
                {% endfor %}
            </select>

            <label for="subfolder_select">Subpasta (Série, Dorama, etc.):</label>
            <select id="subfolder_select" name="subfolder_select">
                <option value="">Nenhuma (Salvar solto na raiz)</option>
            </select>

            <div id="new_subfolder_div">
                <label for="new_subfolder">Nome da Nova Subpasta:</label>
                <input type="text" id="new_subfolder" name="new_subfolder" placeholder="Ex: Game of Thrones (2011)">
            </div>

            <button type="submit">Salvar Destino do Webhook</button>
        </form>

        <div id="message"></div>

        <div class="current-path">
            <strong>Caminho Atual de Destino:</strong><br>
            /mnt/storage/docker/emby/<span id="display-cat">{{ current_config.category }}</span>/<span id="display-sub">{{ current_config.subfolder }}</span>
        </div>

        <hr style="margin: 30px 0; border-color: #45475a;">

        <h2>Gerenciar Arquivos</h2>
        <p style="text-align: center; font-size: 0.9em; margin-bottom: 20px;">Visualize, renomeie ou exclua os arquivos `.strm`.</p>
        
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <button type="button" class="btn-blue" style="margin-top: 0;" onclick="loadFiles()">Carregar Desta Pasta</button>
            <button type="button" class="btn-purple" style="margin-top: 0;" onclick="loadRecentFiles()">Ver Últimos Adicionados</button>
        </div>
        
        <div id="file-container">
            </div>

    </div>

    <script>
        const categorySelect = document.getElementById('category');
        const subfolderSelect = document.getElementById('subfolder_select');
        const newSubfolderDiv = document.getElementById('new_subfolder_div');
        const newSubfolderInput = document.getElementById('new_subfolder');
        
        const currentSubfolder = "{{ current_config.subfolder }}";

        // Carrega as subpastas da categoria selecionada
        async function loadSubfolders(category) {
            const res = await fetch(`/subfolders/${category}`);
            const data = await res.json();
            
            subfolderSelect.innerHTML = '<option value="">Nenhuma (Salvar solto na raiz)</option>';
            
            data.subfolders.forEach(sf => {
                const opt = document.createElement('option');
                opt.value = sf;
                opt.textContent = sf;
                if (sf === currentSubfolder) opt.selected = true;
                subfolderSelect.appendChild(opt);
            });
            
            const newOpt = document.createElement('option');
            newOpt.value = 'NEW';
            newOpt.textContent = '+ Criar Nova Subpasta...';
            subfolderSelect.appendChild(newOpt);

            checkNewSubfolderToggle();
            
            // Limpa a lista de arquivos ao mudar de pasta na interface
            document.getElementById('file-container').innerHTML = '';
        }

        // Exibe ou oculta o input de nova subpasta
        function checkNewSubfolderToggle() {
            if (subfolderSelect.value === 'NEW') {
                newSubfolderDiv.style.display = 'block';
                newSubfolderInput.required = true;
            } else {
                newSubfolderDiv.style.display = 'none';
                newSubfolderInput.required = false;
                newSubfolderInput.value = "";
            }
            document.getElementById('file-container').innerHTML = '';
        }

        // Eventos dos selects
        categorySelect.addEventListener('change', (e) => loadSubfolders(e.target.value));
        subfolderSelect.addEventListener('change', checkNewSubfolderToggle);

        // Submissão do form para salvar destino
        document.getElementById('configForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            
            const response = await fetch('/set-target', {
                method: 'POST',
                body: formData
            });
            const result = await response.json();
            
            if(result.status === 'success') {
                document.getElementById('message').innerText = result.message;
                
                let finalSub = formData.get('subfolder_select') === 'NEW' ? formData.get('new_subfolder') : formData.get('subfolder_select');
                document.getElementById('display-cat').innerText = formData.get('category');
                document.getElementById('display-sub').innerText = finalSub;
                
                setTimeout(() => document.getElementById('message').innerText = '', 3000);
                
                loadSubfolders(categorySelect.value);
            }
        });

        // --- FUNÇÕES DE GERENCIAMENTO DE ARQUIVOS --- //

        // Obtém o destino atual selecionado no form
        function getCurrentTarget() {
            const category = categorySelect.value;
            let subfolder = subfolderSelect.value;
            if (subfolder === 'NEW') subfolder = newSubfolderInput.value;
            return { category, subfolder: subfolder || "" };
        }

        // Carrega arquivos da pasta atualmente selecionada
        async function loadFiles() {
            const target = getCurrentTarget();
            const container = document.getElementById('file-container');
            container.innerHTML = '<p style="text-align:center; margin-top:20px;">Carregando...</p>';

            const res = await fetch(`/list-files?category=${encodeURIComponent(target.category)}&subfolder=${encodeURIComponent(target.subfolder)}`);
            const data = await res.json();
            
            if (!data.files || data.files.length === 0) {
                container.innerHTML = '<p style="text-align:center; margin-top:20px;">Nenhum arquivo .strm encontrado nesta pasta.</p>';
                return;
            }

            let html = '<h3 style="color: #89b4fa; text-align: center; font-size: 1.1em;">Arquivos na pasta atual</h3><ul class="file-list">';
            data.files.forEach(file => {
                const safeFile = file.replace(/'/g, "\\'"); 
                const safeCat = target.category.replace(/'/g, "\\'");
                const safeSub = target.subfolder.replace(/'/g, "\\'");
                html += `
                    <li class="file-item">
                        <span class="file-info">${file}</span>
                        <div class="file-actions">
                            <button type="button" class="btn-rename" onclick="renameFile('${safeCat}', '${safeSub}', '${safeFile}', false)">Renomear</button>
                            <button type="button" class="btn-delete" onclick="deleteFile('${safeCat}', '${safeSub}', '${safeFile}', false)">Excluir</button>
                        </div>
                    </li>
                `;
            });
            html += '</ul>';
            container.innerHTML = html;
        }

        // Carrega os últimos arquivos adicionados no servidor inteiro
        async function loadRecentFiles() {
            const container = document.getElementById('file-container');
            container.innerHTML = '<p style="text-align:center; margin-top:20px;">Carregando arquivos recentes...</p>';

            const res = await fetch(`/recent-files`);
            const data = await res.json();
            
            if (!data.files || data.files.length === 0) {
                container.innerHTML = '<p style="text-align:center; margin-top:20px;">Nenhum arquivo .strm encontrado no servidor.</p>';
                return;
            }

            let html = '<h3 style="color: #cba6f7; text-align: center; font-size: 1.1em;">Últimos 15 arquivos modificados/criados</h3><ul class="file-list">';
            data.files.forEach(item => {
                const safeFile = item.file_name.replace(/'/g, "\\'"); 
                const safeCat = item.category.replace(/'/g, "\\'");
                const safeSub = item.subfolder.replace(/'/g, "\\'");
                let locationText = item.subfolder ? `${item.category} / ${item.subfolder}` : `${item.category} (Raiz)`;
                
                html += `
                    <li class="file-item file-item-col">
                        <div class="file-item-header">
                            <span class="file-info">
                                <strong>${item.file_name}</strong><br>
                                <small style="color: #a6adc8;">Pasta: ${locationText}</small>
                            </span>
                            <div class="file-actions">
                                <button type="button" class="btn-rename" onclick="renameFile('${safeCat}', '${safeSub}', '${safeFile}', true)">Renomear</button>
                                <button type="button" class="btn-delete" onclick="deleteFile('${safeCat}', '${safeSub}', '${safeFile}', true)">Excluir</button>
                            </div>
                        </div>
                    </li>
                `;
            });
            html += '</ul>';
            container.innerHTML = html;
        }

        // Renomeia o arquivo
        async function renameFile(category, subfolder, oldName, isRecentList) {
            const nomeSemExtensao = oldName.replace('.strm', '');
            const novoNomeInput = prompt("Digite o novo nome para o arquivo (a extensão .strm será adicionada automaticamente):", nomeSemExtensao);
            
            if (novoNomeInput === null || novoNomeInput.trim() === "") return; 
            if (novoNomeInput === nomeSemExtensao) return; 

            const res = await fetch('/rename-file', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    category: category,
                    subfolder: subfolder,
                    file_name: oldName,
                    new_name: novoNomeInput
                })
            });

            const result = await res.json();
            if (result.status === 'success') {
                // Atualiza a lista correta após renomear
                if (isRecentList) {
                    loadRecentFiles();
                } else {
                    loadFiles();
                }
            } else {
                alert("Erro ao renomear: " + result.message);
            }
        }

        // Exclui o arquivo
        async function deleteFile(category, subfolder, fileName, isRecentList) {
            const confirmacao = confirm(`ATENÇÃO!\nTem certeza que deseja EXCLUIR DEFINITIVAMENTE o arquivo:\n"${fileName}"?\n\nEsta ação não pode ser desfeita.`);
            if (!confirmacao) return;

            const res = await fetch('/delete-file', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    category: category,
                    subfolder: subfolder,
                    file_name: fileName
                })
            });

            const result = await res.json();
            if (result.status === 'success') {
                // Atualiza a lista correta após excluir
                if (isRecentList) {
                    loadRecentFiles();
                } else {
                    loadFiles();
                }
            } else {
                alert("Erro ao excluir: " + result.message);
            }
        }

        // Carregamento inicial das pastas do form
        loadSubfolders(categorySelect.value);
    </script>
</body>
</html>
